name: CI

on:
  pull_request:
  push:
    branches: [master, feat/eslint-ci]

jobs:
  app:
    name: app (typecheck, lint, tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npx vitest run

  cli:
    name: cli (tests, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: cli/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build
