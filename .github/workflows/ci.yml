name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  app:
    name: app (typecheck, lint, tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint -- --max-warnings=0
      - run: npx vitest run

  integration:
    name: integration (ratelimit)
    runs-on: ubuntu-latest
    services:
      # Same image/credentials/health check as the scaffold job's postgres
      # service below — vitest.integration.config.ts does not stub DATABASE_URL
      # (unlike the unit config), so it must point at a real Postgres that
      # matches what db:migrate and the test below connect to.
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: rag
          POSTGRES_PASSWORD: rag
          POSTGRES_DB: rag
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://rag:rag@localhost:5432/rag
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run db:migrate
      # Only the ratelimit integration suite: it is the one that actually
      # exercises the atomic INSERT ... ON CONFLICT DO UPDATE against a real
      # Postgres (the unit suite's fake models the counter in a JS Map and
      # would stay green even if this regressed to a racy SELECT-then-UPDATE).
      # The rest of the repo's integration tests need live Chroma/Weaviate/
      # Pinecone and are out of scope here.
      - run: RUN_INTEGRATION=1 npx vitest run --config vitest.integration.config.ts src/lib/ratelimit/store.integration.test.ts

  cli:
    name: cli (tests, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: cli/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build

  scaffold:
    name: scaffold (${{ matrix.store }}, ${{ matrix.providers }})
    runs-on: ubuntu-latest
    strategy:
      # One leg failing must not hide the state of the others.
      fail-fast: false
      matrix:
        # Two axes matter here: the vector store (mostly deletes directories)
        # and the provider selection (cli/src/transforms/source.ts uses
        # ts-morph to actually rewrite source per provider). A full cross
        # product is overkill, so every store is exercised once with the
        # default provider set (google), plus one extra leg that exercises
        # the provider-pruning path: ollama alone, which needs no API key and
        # is therefore the case where every other provider's key handling
        # gets pruned away. anthropic alone is not a valid combination here —
        # it can't embed, so cli/src/options.ts's validateSelection rejects it.
        include:
          - store: pgvector
            providers: google
            defaultProvider: google
          - store: qdrant
            providers: google
            defaultProvider: google
          - store: chroma
            providers: google
            defaultProvider: google
          - store: weaviate
            providers: google
            defaultProvider: google
          - store: pinecone
            providers: google
            defaultProvider: google
          - store: pgvector
            providers: ollama
            defaultProvider: ollama
    services:
      # Credentials must match the DATABASE_URL the CLI writes into the generated
      # .env (cli/src/transforms/config.ts). pgvector's image is a superset of
      # stock Postgres, so it serves every store in the matrix.
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: rag
          POSTGRES_PASSWORD: rag
          POSTGRES_DB: rag
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: cli/package-lock.json

      - name: Build the CLI and its template
        working-directory: cli
        run: |
          npm ci
          npm run build:template
          npm run build

      # --no-install: the workflow installs explicitly in the next step, so a
      # failure is attributable. --no-git: nothing here needs a repo.
      - name: Scaffold a project
        run: >
          node cli/dist/index.js out-app --yes
          --vector-store ${{ matrix.store }}
          --providers ${{ matrix.providers }} --default-provider ${{ matrix.defaultProvider }}
          --no-install --no-git

      - name: Install the generated project's dependencies
        working-directory: out-app
        run: npm install

      # pgvector ships a checked-in drizzle/ directory; for every other store the
      # CLI deletes it, so the schema has to be generated from schema.ts.
      - name: Generate migrations (non-pgvector only)
        if: matrix.store != 'pgvector'
        working-directory: out-app
        run: npm run db:generate

      # The install path from the generated README. seed:admin is what creates the
      # default General workspace — without it every workspace lookup throws.
      - name: Migrate and seed
        working-directory: out-app
        run: |
          npm run db:migrate
          npm run seed:admin

      - name: Type-check, lint, and build
        working-directory: out-app
        run: |
          npx tsc --noEmit
          npm run lint
          npm run build

  scaffold-api-only:
    name: scaffold (api-only)
    runs-on: ubuntu-latest
    services:
      # Same image/credentials as the scaffold job's postgres service above;
      # generateEnv() (cli/src/transforms/config.ts) writes this exact
      # DATABASE_URL into the generated .env, so no override is needed here.
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: rag
          POSTGRES_PASSWORD: rag
          POSTGRES_DB: rag
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: cli/package-lock.json

      - name: Build the CLI and its template
        working-directory: cli
        run: |
          npm ci
          npm run build:template
          npm run build

      # One representative selection, same axis choice as the "store: pgvector,
      # providers: google" leg above: google is embedding-capable and needs no
      # API key for the type-check/boot proof below; pgvector ships checked-in
      # migrations, so no db:generate step is needed. --app-kind api is the
      # whole point of this job — it prunes Next.js/React entirely and ships
      # src/server/ (a standalone Hono server) in their place.
      - name: Scaffold an api-only project
        run: >
          node cli/dist/index.js out-app-api --yes
          --app-kind api
          --providers google --default-provider google
          --vector-store pgvector
          --no-install --no-git

      - name: Install the generated project's dependencies
        working-directory: out-app-api
        run: npm install

      # Postgres is already reachable via this job's service on
      # localhost:5432, with credentials generateEnv() already wrote into
      # .env — migrate directly (pgvector needs no db:generate).
      - name: Migrate
        working-directory: out-app-api
        run: npm run db:migrate

      - name: Type-check
        working-directory: out-app-api
        run: npx tsc --noEmit

      # api-only's own `build` script IS `tsc --noEmit` (see
      # rewriteScriptsForApiOnly in cli/src/transforms/config.ts): `dev`/`start`
      # run the TypeScript source directly via tsx (which resolves the `@/*`
      # path aliases from tsconfig.json at run time), so there is nothing to
      # bundle. Run it anyway, as its own step, so a future change to that
      # script is exercised here too — not just by the tsc invocation above,
      # which happens to be identical today but isn't guaranteed to stay so.
      - name: Build
        working-directory: out-app-api
        run: npm run build

      # Boot the server and prove it actually serves traffic. Postgres is up
      # and migrated above, so GET /api/health's `select 1`
      # (src/api/health/handler.ts) must succeed: this asserts a TRUE 200, not
      # merely "the process answers" — a 503 would also prove the server
      # booted and routed the request (both are valid boot proofs in
      # general), but since a real, migrated Postgres is already standing
      # here for this job, there is no reason to settle for the weaker one.
      - name: Boot the server and assert GET /api/health is 200
        working-directory: out-app-api
        run: |
          # `npm run start` = `tsx src/server/index.ts` (no dist/ — see the
          # Build step's comment above). .env already carries a DATABASE_URL
          # matching this job's postgres service, plus a real
          # AUTH_SECRET/SETTINGS_ENCRYPTION_KEY, both freshly generated by the
          # scaffold step.
          npm run start > server.log 2>&1 &
          pid=$!

          status="000"
          # tsx's first run has to type-strip every transitive import (slower
          # than a compiled `node dist/...` start), so poll instead of a fixed
          # sleep.
          for i in $(seq 1 30); do
            status=$(curl -s -o /tmp/health.json -w '%{http_code}' http://localhost:3000/api/health || echo "000")
            if [ "$status" = "200" ]; then break; fi
            sleep 1
          done

          echo "final /api/health status: $status"
          cat /tmp/health.json 2>/dev/null; echo

          kill "$pid" 2>/dev/null || true
          wait "$pid" 2>/dev/null || true

          if [ "$status" != "200" ]; then
            echo "--- server log ---"
            cat server.log
            exit 1
          fi
