services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
      POSTGRES_DB: rag
    ports:
      - "5432:5432"
    volumes:
      - rag_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag"]
      interval: 5s
      timeout: 5s
      retries: 10
  # Behind a profile so local development is untouched: `docker compose up -d db minio`
  # still starts only the dependencies. Run the whole stack with:
  #   docker compose --profile app up --build
  app:
    profiles: ["app"]
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
      createbuckets:
        condition: service_completed_successfully
    env_file: .env
    environment:
      # .env points these at localhost, which inside this container means the
      # container itself. Inside the compose network they must address the other
      # services by name. This override is the classic trap and the reason this
      # block exists.
      DATABASE_URL: postgres://rag:rag@db:5432/rag
      S3_ENDPOINT: http://minio:9000
      # Auth.js v5 rejects the Host header in production unless it is told the
      # host is trustworthy ("UntrustedHost"), so every login 500s. Safe here:
      # the app sits behind the compose network on a host we control. When you
      # put this behind a real reverse proxy, keep this true and make sure the
      # proxy sets Host / X-Forwarded-* correctly.
      AUTH_TRUST_HOST: "true"
    ports:
      - "3000:3000"
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - rag_minio:/data
  createbuckets:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin) do echo waiting for minio; sleep 1; done;
      /usr/bin/mc mb -p local/rag-images;
      exit 0;
      "
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - rag_qdrant:/qdrant/storage
  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - rag_chroma:/data
  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:latest
    ports:
      - "8080:8080"
      - "50051:50051"
    environment:
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      DEFAULT_VECTORIZER_MODULE: "none"
      ENABLE_MODULES: ""
    volumes:
      - rag_weaviate:/var/lib/weaviate
volumes:
  rag_pgdata:
  rag_minio:
  rag_qdrant:
  rag_chroma:
  rag_weaviate:
